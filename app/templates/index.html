<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="display__expression" id="expression"></div>
      <div class="display__result" id="result">0</div>
    </div>
    <div class="keypad">
      <button class="btn btn--wide btn--secondary" data-action="clear">AC</button>
      <button class="btn btn--secondary" data-action="sign">+/−</button>
      <button class="btn btn--secondary" data-action="percent">%</button>
      <button class="btn btn--operator" data-action="operator" data-value="/">÷</button>

      <button class="btn" data-action="number" data-value="7">7</button>
      <button class="btn" data-action="number" data-value="8">8</button>
      <button class="btn" data-action="number" data-value="9">9</button>
      <button class="btn btn--operator" data-action="operator" data-value="*">×</button>

      <button class="btn" data-action="number" data-value="4">4</button>
      <button class="btn" data-action="number" data-value="5">5</button>
      <button class="btn" data-action="number" data-value="6">6</button>
      <button class="btn btn--operator" data-action="operator" data-value="-">−</button>

      <button class="btn" data-action="number" data-value="1">1</button>
      <button class="btn" data-action="number" data-value="2">2</button>
      <button class="btn" data-action="number" data-value="3">3</button>
      <button class="btn btn--operator" data-action="operator" data-value="+">+</button>

      <button class="btn btn--wide" data-action="number" data-value="0">0</button>
      <button class="btn" data-action="decimal">.</button>
      <button class="btn btn--operator btn--equals" data-action="equals">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('result');
    const expression = document.getElementById('expression');

    let current = '0';
    let previous = '';
    let operator = null;
    let freshInput = false;

    function updateDisplay() {
      display.textContent = current;
    }

    document.querySelector('.keypad').addEventListener('click', (e) => {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      const action = btn.dataset.action;
      const value = btn.dataset.value;

      if (action === 'number') {
        if (freshInput) { current = value; freshInput = false; }
        else current = current === '0' ? value : current + value;
      } else if (action === 'decimal') {
        if (freshInput) { current = '0.'; freshInput = false; }
        else if (!current.includes('.')) current += '.';
      } else if (action === 'operator') {
        if (operator && !freshInput) calculate();
        previous = current;
        operator = value;
        expression.textContent = `${previous} ${btn.textContent}`;
        freshInput = true;
      } else if (action === 'equals') {
        if (!operator) return;
        expression.textContent = `${previous} ${operator} ${current} =`;
        calculate();
        operator = null;
      } else if (action === 'clear') {
        current = '0'; previous = ''; operator = null; freshInput = false;
        expression.textContent = '';
      } else if (action === 'sign') {
        current = String(parseFloat(current) * -1);
      } else if (action === 'percent') {
        current = String(parseFloat(current) / 100);
      }

      updateDisplay();
    });

    function calculate() {
      const a = parseFloat(previous);
      const b = parseFloat(current);
      const ops = { '+': a + b, '-': a - b, '*': a * b, '/': a / b };
      current = String(ops[operator] ?? b);
      freshInput = true;
    }
  </script>
</body>
</html>
